name: Controlar servidor Minecraft

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operação solicitada pelo painel
        required: true
        type: choice
        options:
          - start
          - stop
          - restart
          - status
          - apply
          - command
          - backup
          - update
      payload:
        description: Dados da operação em JSON Base64
        required: false
        default: e30=
        type: string
      request_id:
        description: Identificador da solicitação
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: minecraft-azure-control
  cancel-in-progress: false

jobs:
  control:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AZURE_CORE_OUTPUT: none
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_VM_NAME: ${{ vars.AZURE_VM_NAME }}
      OPERATION: ${{ inputs.operation }}
      PAYLOAD_B64: ${{ inputs.payload }}
      REQUEST_ID: ${{ inputs.request_id }}

    steps:
      - name: Baixar painel
        uses: actions/checkout@v6

      - name: Entrar na Azure sem senha fixa
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Executar operação
        id: control
        continue-on-error: true
        run: python3 automation/control.py

      - name: Publicar novo estado
        if: always()
        run: |
          git config user.name "Mine-Etec Panel"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza estado do servidor"
            git push
          fi

      - name: Informar falha
        if: steps.control.outcome == 'failure'
        run: exit 1
